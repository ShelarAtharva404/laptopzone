apiVersion: v1
kind: Service
metadata:
  name: laptopzone-frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: laptopzone-backend
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: laptopzone-frontend
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontend
          securityContext:
            allowPrivilegeEscalation: false

