apiVersion: apps/v1
kind: Deployment
metadata:
  name: laptopzone-mongodb
  labels:
    app: laptopzone-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laptopzone-mongodb
  template:
    metadata:
      labels:
        app: laptopzone-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          ports:
            - containerPort: 27017
              name: mongodb
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
  selector:
    app: laptopzone-mongodb
