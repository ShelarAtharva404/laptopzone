apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laptopzone-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - laptopzone.com
        - www.laptopzone.com
      secretName: laptopzone-tls
  rules:
    - host: laptopzone.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: laptopzone-backend-prod
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laptopzone-frontend-prod
                port:
                  number: 80
    - host: www.laptopzone.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: laptopzone-backend-prod
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laptopzone-frontend-prod
                port:
                  number: 80
