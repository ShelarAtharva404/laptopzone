apiVersion: apps/v1
kind: Deployment
metadata:
  name: laptopzone-backend
  labels:
    app: laptopzone-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: laptopzone-backend
  template:
    metadata:
      labels:
        app: laptopzone-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: laptopzone-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Node needs write access to temporary cache
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: laptopzone-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: laptopzone-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: laptopzone-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
