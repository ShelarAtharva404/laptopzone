# ═══════════════════════════════════════════════════════════════
# Alertmanager Configuration - LaptopZone
# Routes alert notifications dynamically based on severity.
# ═══════════════════════════════════════════════════════════════

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.mailgun.org:587'
  smtp_from: 'alertmanager@laptopzone.com'
  smtp_auth_username: 'postmaster@laptopzone.com'
  smtp_auth_password: 'dummy_smtp_password'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-notifications'
  
  routes:
    # Route critical alerts to both Slack and Email receivers
    - match:
        severity: critical
      receiver: 'slack-and-email-critical'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - channel: '#alerts-devops'
        api_url: 'http://localhost:8080/dummy-slack-webhook-url'
        send_resolved: true
        title: '[[ .Status | toUpper ]] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }} - {{ .Labels.severity }}
            *Description:* {{ .Annotations.description }}
            *Instance:* {{ .Labels.instance }}
          {{ end }}

  - name: 'slack-and-email-critical'
    slack_configs:
      - channel: '#alerts-critical'
        api_url: 'http://localhost:8080/dummy-slack-webhook-url'
        send_resolved: true
        title: '🚨 [[ .Status | toUpper ]] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }} - *CRITICAL*
            *Description:* {{ .Annotations.description }}
            *Runbook:* {{ .Annotations.runbook }}
          {{ end }}
    email_configs:
      - to: 'devops-alerts@laptopzone.com'
        send_resolved: true
        headers:
          subject: '🚨 CRITICAL ALERT: {{ .CommonLabels.alertname }}'
