# ═══════════════════════════════════════════════════════════════
# LaptopZone - GitHub Actions CI/CD Pipeline
# Stages: Validate → Test → Build → Security → Deploy Staging → Integration Test → Deploy Production/ECS → Notify
# ═══════════════════════════════════════════════════════════════

name: LaptopZone CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
      - '*.*.*'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  NODE_ENV: test

jobs:
  # ─── Validate Stage ──────────────────────────────────────────────
  validate-backend:
    name: Validate Backend Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Validate Backend Dependencies
        run: |
          cd backend
          npm ci
          echo "✅ Backend dependencies validated"

  validate-frontend:
    name: Validate Frontend Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Frontend Dependencies
        run: |
          cd frontend
          npm ci
          echo "✅ Frontend dependencies validated"

  # ─── Test Stage ──────────────────────────────────────────────────
  test-backend:
    name: Backend Health & Tests
    runs-on: ubuntu-latest
    needs: [validate-backend]
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://localhost:27017/laptopzone_test
      JWT_SECRET: test_jwt_secret_key_minimum_32_characters
      NODE_ENV: test
      PORT: 5000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install & Run Backend Tests
        run: |
          cd backend
          npm ci
          echo "Running backend health validation..."
          node -e "require('./server.js')" &
          sleep 5
          curl -f http://localhost:5000/health || exit 1
          echo "✅ Backend health check passed"

  test-frontend:
    name: Frontend Production Compile
    runs-on: ubuntu-latest
    needs: [validate-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React Application
        run: |
          cd frontend
          npm ci
          npm run build
          echo "✅ Frontend build successful"

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─── Build Stage ─────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/')
    outputs:
      repo_lower: ${{ steps.repo_name.outputs.repo_lower }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Name
        id: repo_name
        run: |
          echo "repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git-commit=${{ github.sha }}
            build-date=${{ steps.date.outputs.date }}
            version=${{ github.ref_name }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            git-commit=${{ github.sha }}

  # ─── Security Stage ──────────────────────────────────────────────
  security-scan-backend:
    name: Security Scan Backend Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Downcase Repository Name
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy Vulnerability Scanner (JSON Report)
        uses: aquasec/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
          format: 'json'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'
          output: 'trivy-backend-report.json'

      - name: Upload Trivy Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-report
          path: trivy-backend-report.json
          retention-days: 7

      - name: Run Trivy Vulnerability Scanner (Fail on Critical)
        uses: aquasec/trivy-action@master
        with:
          image-ref: ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

  dependency-audit:
    name: NPM Dependency Security Audit
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Run Backend NPM Audit
        run: |
          cd backend
          npm audit --audit-level=high || true

      - name: Run Frontend NPM Audit
        run: |
          cd ../frontend
          npm audit --audit-level=high || true

  # ─── Deploy Staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.laptopzone.com
    steps:
      - name: Execute Deploy Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/laptopzone
            
            # Downcase repo name for image reference
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Authenticate remote Docker with GHCR using GITHUB_TOKEN passed from runner
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images
            docker pull ghcr.io/$REPO_LOWER/backend:${{ github.sha }}
            docker pull ghcr.io/$REPO_LOWER/frontend:${{ github.sha }}
            
            # Update docker-compose with new image tags
            export BACKEND_IMAGE=ghcr.io/$REPO_LOWER/backend:${{ github.sha }}
            export FRONTEND_IMAGE=ghcr.io/$REPO_LOWER/frontend:${{ github.sha }}
            export APP_VERSION=${{ github.sha }}
            
            # Rolling update with zero downtime
            docker-compose up -d --no-deps --scale backend=2 backend
            sleep 10
            docker-compose up -d --no-deps backend
            
            # Update frontend
            docker-compose up -d --no-deps frontend
            
            # Clean up old images
            docker image prune -f
            
            echo "✅ Staging deployment complete"

  # ─── Integration Tests ───────────────────────────────────────────
  integration-test-staging:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
    steps:
      - name: Run Staging Verification Curis
        run: |
          echo "🧪 Running integration tests on staging..."
          sleep 15  # Wait for deployment to stabilize
          curl -f https://staging.laptopzone.com/api/health || exit 1
          curl -f https://staging.laptopzone.com || exit 1
          echo "✅ Integration tests passed"

  # ─── Deploy Production ───────────────────────────────────────────
  deploy-production:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    environment:
      name: production
      url: https://laptopzone.com
    steps:
      - name: Execute Deploy Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/laptopzone
            
            # Downcase repo name
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            
            # Authenticate remote Docker with GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Backup current state
            docker-compose config > backup-docker-compose-$(date +%Y%m%d%H%M%S).yml
            
            # Pull new images
            docker pull ghcr.io/$REPO_LOWER/backend:${{ github.sha }}
            docker pull ghcr.io/$REPO_LOWER/frontend:${{ github.sha }}
            
            export BACKEND_TAG=${{ github.sha }}
            export FRONTEND_TAG=${{ github.sha }}
            
            # Blue-Green deployment: scale up new, scale down old
            docker-compose up -d --no-deps --scale backend=2 backend
            sleep 20
            
            # Health check new instances
            for i in 1 2 3; do
              curl -f http://localhost:5000/health && break
              sleep 5
            done
            
            # Complete deployment
            docker-compose up -d
            
            # Cleanup
            docker image prune -f --filter "until=24h"
            
            echo "✅ Production deployment complete"

  # ─── AWS ECS Deployment ──────────────────────────────────────────
  deploy-aws-ecs:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update ECS Services
        run: |
          echo "🚀 Deploying to AWS ECS..."
          aws ecs update-service \
            --cluster laptopzone-cluster \
            --service laptopzone-backend \
            --force-new-deployment \
            --region ap-south-1
          
          aws ecs update-service \
            --cluster laptopzone-cluster \
            --service laptopzone-frontend \
            --force-new-deployment \
            --region ap-south-1
          
          # Wait for deployment
          aws ecs wait services-stable \
            --cluster laptopzone-cluster \
            --services laptopzone-backend laptopzone-frontend \
            --region ap-south-1
          
          echo "✅ AWS ECS deployment complete"

  # ─── Deploy K8s Staging ──────────────────────────────────────────
  deploy-k8s-staging:
    name: Deploy to Kubernetes Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging-k8s.laptopzone.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBERNETES_KUBE_CONFIG }}

      - name: Downcase Repository Name
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set Kustomize Image Tags
        run: |
          cd k8s/overlays/staging
          kustomize edit set image backend=ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
          kustomize edit set image frontend=ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}

      - name: Deploy Staging to Kubernetes
        run: |
          kubectl apply -k k8s/overlays/staging

      - name: Verify Staging Rollout
        run: |
          kubectl rollout status deployment/laptopzone-backend-staging -n staging --timeout=120s
          kubectl rollout status deployment/laptopzone-frontend-staging -n staging --timeout=120s

  # ─── Deploy K8s Production ───────────────────────────────────────
  deploy-k8s-production:
    name: Deploy to Kubernetes Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    environment:
      name: production
      url: https://k8s.laptopzone.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBERNETES_KUBE_CONFIG }}

      - name: Downcase Repository Name
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set Kustomize Image Tags
        run: |
          cd k8s/overlays/production
          kustomize edit set image backend=ghcr.io/${{ env.REPO_LOWER }}/backend:${{ github.sha }}
          kustomize edit set image frontend=ghcr.io/${{ env.REPO_LOWER }}/frontend:${{ github.sha }}

      - name: Deploy Production to Kubernetes
        run: |
          kubectl apply -k k8s/overlays/production

      - name: Verify Production Rollout
        run: |
          kubectl rollout status deployment/laptopzone-backend-prod -n production --timeout=180s
          kubectl rollout status deployment/laptopzone-frontend-prod -n production --timeout=180s

  # ─── Notify Stage ────────────────────────────────────────────────
  notify:
    name: Slack Notification Reporting
    runs-on: ubuntu-latest
    needs:
      - validate-backend
      - validate-frontend
      - test-backend
      - test-frontend
      - build
      - security-scan-backend
      - dependency-audit
      - deploy-staging
      - integration-test-staging
      - deploy-production
      - deploy-aws-ecs
      - deploy-k8s-staging
      - deploy-k8s-production
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Short SHA & Commit Message
        id: info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_OUTPUT

      - name: Dispatch Success Notification
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \"✅ *LaptopZone Deployed!* \`${{ github.ref_name }}\` by ${{ github.actor }}\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"Commit\", \"value\": \"${{ steps.info.outputs.sha_short }}\", \"short\": true},
                  {\"title\": \"Message\", \"value\": \"${{ steps.info.outputs.commit_msg }}\", \"short\": false},
                  {\"title\": \"Workflow Run\", \"value\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"short\": false}
                ]
              }]
            }" || true

      - name: Dispatch Failure Notification
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"❌ *LaptopZone Pipeline FAILED!* \`${{ github.ref_name }}\` — Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
